<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LASU Life" />
    
    <link rel="manifest" href="/manifest.json" />
    
    <title>LASU Student Life 360</title>
    <style>
      /* Custom scrollbar for a more app-like feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Disable text selection for app-like feel, allow on inputs */
      body {
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      input, textarea {
        user-select: text;
      }
    </style>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-gray-100 text-gray-900 overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
